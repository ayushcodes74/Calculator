<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            min-width: 100vw;
            margin: 0px;
            padding: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #buttons {
            display: grid;
            grid-template-columns: 4fr 4fr 4fr 4fr;
            grid-template-rows: 4fr 4fr 4fr 4fr;
            height: 200px;
            width: 300px;
        }
        .calculator {
            background: #0f172a;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        #display {
            height: 80px;
            background-color: #1e293b;
            color: white;
            font-size: 2rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 20px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        button {
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 10px;
        }
        #add-btn,
        #subtract-btn,
        #multiply-btn,
        #divide-btn {
            background-color: #f59e0b;
            color: white;
        }
        #equal-btn {
            background-color: #22c55e;
            color: white;
        }
        #clear-btn {
            background-color: #ef4444;
            color: white;
        }
        #buttons {
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div id="display">0</div>
        <div id="buttons">
            <button id="btn7" class="number-btn">7</button>
            <button id="btn8" class="number-btn">8</button>
            <button id="btn9" class="number-btn">9</button>
            <button id="divide-btn">/</button>
            <button id="btn4" class="number-btn">4</button>
            <button id="btn5" class="number-btn">5</button>
            <button id="btn6" class="number-btn">6</button>
            <button id="multiply-btn">*</button>
            <button id="btn1" class="number-btn">1</button>
            <button id="btn2" class="number-btn">2</button>
            <button id="btn3" class="number-btn">3</button>
            <button id="subtract-btn">-</button>
            <button id="clear-btn">C</button>
            <button id="btn0" class="number-btn">0</button>
            <button id="equal-btn">=</button>
            <button id="add-btn">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
